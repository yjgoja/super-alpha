# Super Alpha always-on trading engine (PC 불필요; MetaAPI 한도 회피 간격)
# Deploy: push to GitHub → Render Blueprint / `render services create`
# Cost: Background Worker Starter ≈ $7/mo (always-on; Free tier 없음)
services:
  - type: worker
    name: super-alpha-engine
    runtime: docker
    dockerfilePath: ./Dockerfile.engine
    repo: https://github.com/yjgoja/super-alpha
    plan: starter
    region: ohio
    branch: master
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: super-alpha-db
          property: connectionString
      - key: METAAPI_TOKEN
        sync: false
      - key: ENGINE_MODE
        value: direct
      - key: ENGINE_INTERVAL_MS
        value: "60000"
      - key: STREAM_OPEN_BASKETS
        value: "1"
      - key: STREAM_OPEN_INTERVAL_MS
        value: "12000"
      - key: STREAM_OPEN_MAX
        value: "20"
      - key: STREAM_OPEN_CONCURRENCY
        value: "2"
      - key: ENGINE_SNAP_STALE_MS
        value: "15000"
      - key: METAAPI_SNAP_MIN_MS
        value: "10000"
      - key: METAAPI_ACCOUNT_INFO_TTL_MS
        value: "90000"
      - key: METAAPI_PRICE_CACHE_MS
        value: "5000"
      - key: PNL_SYNC_THROTTLE_MS
        value: "180000"
      - key: IDLE_BOT_UNDEPLOY_HOURS
        value: "2"
      - key: BROKER_PROTECT_TP_SL
        value: "1"
      - key: ENGINE_BUDGET_MS
        value: "600000"
      - key: ENGINE_DB_HOST_ALLOW
        value: render.com
      - key: ENGINE_CLOUD_WAIT_MS
        value: "45000"
      - key: NODE_ENV
        value: production
